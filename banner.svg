<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="320" fill="#eceae4"/>

  <!-- Dot grid pattern -->
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1a1a18" fill-opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Left fade -->
  <rect width="320" height="320" fill="url(#fadeL)"/>
  <!-- Right fade -->
  <rect x="960" width="320" height="320" fill="url(#fadeR)"/>

  <defs>
    <linearGradient id="fadeL" x1="0" y1="0" x2="320" y2="0">
      <stop offset="0%" stop-color="#eceae4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#eceae4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="0" y1="0" x2="320" y2="0">
      <stop offset="0%" stop-color="#eceae4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#eceae4" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0" y1="0" x2="0" y2="320">
      <stop offset="0%" stop-color="#eceae4" stop-opacity="1"/>
      <stop offset="30%" stop-color="#eceae4" stop-opacity="0"/>
      <stop offset="70%" stop-color="#eceae4" stop-opacity="0"/>
      <stop offset="100%" stop-color="#eceae4" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#fadeTop)"/>

  <!-- Decorative lines left -->
  <line x1="80" y1="0" x2="80" y2="320" stroke="#1a1a18" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="160" y1="0" x2="160" y2="320" stroke="#1a1a18" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Decorative lines right -->
  <line x1="1120" y1="0" x2="1120" y2="320" stroke="#1a1a18" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="1200" y1="0" x2="1200" y2="320" stroke="#1a1a18" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Horizontal rule top -->
  <line x1="0" y1="1" x2="1280" y2="1" stroke="#1a1a18" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Horizontal rule bottom -->
  <line x1="0" y1="319" x2="1280" y2="319" stroke="#1a1a18" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Small tag top-left -->
  <rect x="48" y="40" width="90" height="24" rx="12" fill="#1a1a18" fill-opacity="0.08"/>
  <text x="93" y="56" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="10" font-weight="600" fill="#1a1a18" fill-opacity="0.5" text-anchor="middle" letter-spacing="1.5">PORTFOLIO</text>

  <!-- Main logo text RAM.FR -->
  <text x="640" y="172" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="#1a1a18" text-anchor="middle" letter-spacing="-4">RAM.FR</text>

  <!-- Subtitle -->
  <text x="640" y="212" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="400" fill="#5a5a54" text-anchor="middle" letter-spacing="0.5">Frontend Developer — HTML · CSS · JavaScript</text>

  <!-- Divider line under subtitle -->
  <line x1="540" y1="228" x2="740" y2="228" stroke="#1a1a18" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Bottom tagline -->
  <text x="640" y="258" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="400" fill="#9a9a90" text-anchor="middle" letter-spacing="0.3">"Code is the closest thing we have to a superpower."</text>

  <!-- Small decorative dot left of tagline -->
  <circle cx="390" cy="254" r="3" fill="#1a1a18" fill-opacity="0.2"/>
  <circle cx="890" cy="254" r="3" fill="#1a1a18" fill-opacity="0.2"/>

  <!-- Corner marks -->
  <path d="M48 80 L48 60 L68 60" stroke="#1a1a18" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>
  <path d="M1232 80 L1232 60 L1212 60" stroke="#1a1a18" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>
  <path d="M48 240 L48 260 L68 260" stroke="#1a1a18" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>
  <path d="M1232 240 L1232 260 L1212 260" stroke="#1a1a18" stroke-opacity="0.2" stroke-width="1.5" fill="none"/>

  <!-- Small star/sparkle top right area -->
  <text x="1100" y="100" font-family="sans-serif" font-size="18" fill="#1a1a18" fill-opacity="0.15" text-anchor="middle">✦</text>
  <text x="180" y="230" font-family="sans-serif" font-size="12" fill="#1a1a18" fill-opacity="0.1" text-anchor="middle">✦</text>
</svg>
